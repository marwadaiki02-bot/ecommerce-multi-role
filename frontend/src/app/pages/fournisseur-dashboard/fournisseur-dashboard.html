<div class="flex min-h-screen bg-gradient-to-br from-gray-900 via-indigo-900 to-purple-900 text-white">
  <!-- Sidebar -->
  <aside class="w-64 bg-white/10 backdrop-blur-lg p-6 flex flex-col gap-6 border-r border-white/20">
    <h1 class="text-2xl font-extrabold text-indigo-300 mb-6">Dashboard Fournisseur</h1>
    <nav class="flex flex-col gap-3">
      <button (click)="activeTab='produits'"
              [class.bg-indigo-700]="activeTab==='produits'"
              class="text-left px-4 py-2 rounded-lg hover:bg-indigo-600 transition font-medium flex items-center gap-2">
        📦 <span>Produits</span>
      </button>
      <button (click)="activeTab='commandes'"
              [class.bg-indigo-700]="activeTab==='commandes'"
              class="text-left px-4 py-2 rounded-lg hover:bg-indigo-600 transition font-medium flex items-center gap-2">
        🛒 <span>Commandes</span>
      </button>
    </nav>
    <button (click)="logout()" class="mt-auto bg-gradient-to-r from-red-500 to-pink-600 text-white font-semibold py-2 rounded-lg shadow-md hover:scale-105 transition-transform">
      Déconnexion
    </button>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-10 flex flex-col gap-8">
    <mat-card *ngIf="activeTab==='produits'" class="bg-white/10 backdrop-blur-md rounded-2xl shadow-xl border border-white/20 p-6">
      <h2 class="text-xl font-bold mb-4 text-indigo-200">Produits</h2>
      <table mat-table [dataSource]="products" class="mat-elevation-z8 w-full rounded-lg overflow-hidden text-white">
        <!-- colonnes produits -->
      </table>
    </mat-card>

    <mat-card *ngIf="activeTab==='commandes'" class="bg-white/10 backdrop-blur-md rounded-2xl shadow-xl border border-white/20 p-6">
      <h2 class="text-xl font-bold mb-4 text-indigo-200">Commandes</h2>
      <table mat-table [dataSource]="orders" class="mat-elevation-z8 w-full rounded-lg overflow-hidden text-white">
        <!-- colonnes commandes -->
      </table>
    </mat-card>
  </main>
</div>
