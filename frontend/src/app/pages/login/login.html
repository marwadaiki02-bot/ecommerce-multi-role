<div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-purple-500 via-pink-500 to-red-500">
  <!-- Carte translucide avec effet glassmorphism -->
  <div class="bg-white/20 backdrop-blur-xl p-10 rounded-3xl shadow-2xl w-[420px] border border-white/30">
    <!-- Logo ou icône -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg">
        <span class="text-white text-2xl font-bold">🔑</span>
      </div>
    </div>

    <h2 class="text-3xl font-extrabold mb-8 text-center text-white drop-shadow-lg">
      Bienvenue
    </h2>

    <form (ngSubmit)="login()" class="flex flex-col gap-6">
      <div>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Nom d'utilisateur"
          class="w-full bg-white/30 text-white placeholder-white/70 rounded-xl px-4 py-3 focus:ring-2 focus:ring-pink-400 focus:outline-none transition"
          required
        />
      </div>

      <div>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Mot de passe"
          class="w-full bg-white/30 text-white placeholder-white/70 rounded-xl px-4 py-3 focus:ring-2 focus:ring-pink-400 focus:outline-none transition"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3 rounded-xl shadow-lg hover:from-indigo-700 hover:to-purple-700 transition-transform transform hover:scale-105"
      >
        Se connecter
      </button>
    </form>

    <p *ngIf="errorMessage" class="text-red-200 mt-6 text-center font-medium">
      {{ errorMessage }}
    </p>
  </div>
</div>
